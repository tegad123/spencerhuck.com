<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Property Showcase — Spencer Huck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --text: #ffffff;
      --accent: #c9a96e;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Satoshi', 'Inter', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    .slideshow {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      will-change: opacity;
    }

    .slide.active {
      opacity: 1;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Ken Burns subtle zoom */
    .slide.active img {
      animation: kenburns 3.5s ease-in-out forwards;
    }

    @keyframes kenburns {
      from { transform: scale(1); }
      to   { transform: scale(1.04); }
    }

    /* Progress bar */
    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: var(--accent);
      z-index: 20;
      transition: width 0.1s linear;
    }

    /* Slide counter */
    .slide-counter {
      position: fixed;
      bottom: 20px;
      right: 24px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: rgba(255,255,255,0.7);
      z-index: 20;
      letter-spacing: 0.05em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    /* Subtle vignette overlay */
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.3) 100%);
      pointer-events: none;
      z-index: 10;
    }

    /* Controls */
    .controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.3s;
    }

    body:hover .controls {
      opacity: 1;
    }

    .controls button {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .controls button:hover {
      background: rgba(255,255,255,0.3);
    }

    .controls button.active {
      background: var(--accent);
      border-color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="slideshow" id="slideshow"></div>
  <div class="vignette"></div>
  <div class="progress-bar" id="progressBar"></div>
  <div class="slide-counter" id="counter"></div>

  <div class="controls">
    <button id="prevBtn" title="Previous">&#8249;</button>
    <button id="playBtn" class="active" title="Play/Pause">&#9646;&#9646;</button>
    <button id="nextBtn" title="Next">&#8250;</button>
  </div>

  <script>
    const images = [
      'assets/slideshow/01-WSL00118.jpg',
      'assets/slideshow/02-WSL00001.jpg',
      'assets/slideshow/03-WSL00004.jpg',
      'assets/slideshow/04-WSL00007.jpg',
      'assets/slideshow/05-WSL00010.jpg',
      'assets/slideshow/06-WSL00010.jpg',
      'assets/slideshow/07-WSL00013.jpg',
      'assets/slideshow/08-WSL00016.jpg',
      'assets/slideshow/09-WSL00019.jpg',
      'assets/slideshow/10-WSL00022.jpg',
      'assets/slideshow/11-WSL00025.jpg',
      'assets/slideshow/12-WSL00028.jpg',
      'assets/slideshow/13-WSL00031.jpg',
      'assets/slideshow/14-WSL00034.jpg',
      'assets/slideshow/15-WSL00037.jpg',
      'assets/slideshow/16-WSL00040.jpg',
      'assets/slideshow/17-WSL00043.jpg',
      'assets/slideshow/18-WSL00130.png',
      'assets/slideshow/19-WSL00133.png',
      'assets/slideshow/20-WSL00046.jpg',
      'assets/slideshow/21-WSL00049.jpg',
      'assets/slideshow/22-WSL00052.jpg',
      'assets/slideshow/23-WSL00136.jpg',
      'assets/slideshow/24-WSL00055.jpg',
      'assets/slideshow/25-WSL00061.jpg',
      'assets/slideshow/26-WSL00064.jpg',
      'assets/slideshow/27-WSL00067.jpg',
      'assets/slideshow/28-WSL00073.jpg',
      'assets/slideshow/29-WSL00076.jpg',
      'assets/slideshow/30-WSL00079.jpg',
      'assets/slideshow/31-WSL00082.jpg',
      'assets/slideshow/32-WSL00085.jpg',
      'assets/slideshow/33-WSL00094.jpg',
      'assets/slideshow/34-WSL00097.jpg',
      'assets/slideshow/35-WSL00100.jpg',
      'assets/slideshow/36-WSL00103.jpg',
      'assets/slideshow/37-WSL00106.jpg',
      'assets/slideshow/38-WSL00109.jpg',
      'assets/slideshow/39-WSL00112.jpg',
      'assets/slideshow/40-WSL00121.jpg',
      'assets/slideshow/41-WSL00124.jpg'
    ];

    const DURATION = 2500; // 2.5 seconds per slide
    const FADE_TIME = 1000; // 1s crossfade
    let current = 0;
    let playing = true;
    let timer = null;
    let progressTimer = null;

    const slideshow = document.getElementById('slideshow');
    const progressBar = document.getElementById('progressBar');
    const counter = document.getElementById('counter');
    const playBtn = document.getElementById('playBtn');

    // Create slide elements
    images.forEach((src, i) => {
      const div = document.createElement('div');
      div.className = 'slide' + (i === 0 ? ' active' : '');
      const img = document.createElement('img');
      img.src = src;
      img.alt = `Property photo ${i + 1}`;
      img.loading = i < 3 ? 'eager' : 'lazy';
      div.appendChild(img);
      slideshow.appendChild(div);
    });

    const slides = document.querySelectorAll('.slide');

    function updateCounter() {
      counter.textContent = `${current + 1} / ${images.length}`;
    }

    function startProgress() {
      let start = performance.now();
      progressBar.style.width = '0%';

      function tick(now) {
        const elapsed = now - start;
        const pct = Math.min((elapsed / DURATION) * 100, 100);
        progressBar.style.width = pct + '%';
        if (pct < 100 && playing) {
          progressTimer = requestAnimationFrame(tick);
        }
      }
      progressTimer = requestAnimationFrame(tick);
    }

    function goTo(index) {
      slides[current].classList.remove('active');
      current = (index + images.length) % images.length;
      slides[current].classList.add('active');
      updateCounter();
      startProgress();
    }

    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    function autoPlay() {
      if (!playing) return;
      timer = setTimeout(() => {
        next();
        autoPlay();
      }, DURATION);
    }

    function togglePlay() {
      playing = !playing;
      playBtn.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
      playBtn.classList.toggle('active', playing);
      if (playing) {
        startProgress();
        autoPlay();
      } else {
        clearTimeout(timer);
        cancelAnimationFrame(progressTimer);
      }
    }

    // Event listeners
    playBtn.addEventListener('click', togglePlay);
    document.getElementById('prevBtn').addEventListener('click', () => {
      clearTimeout(timer);
      prev();
      if (playing) autoPlay();
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      clearTimeout(timer);
      next();
      if (playing) autoPlay();
    });

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        clearTimeout(timer);
        next();
        if (playing) autoPlay();
      } else if (e.key === 'ArrowLeft') {
        clearTimeout(timer);
        prev();
        if (playing) autoPlay();
      } else if (e.key === 'p' || e.key === 'P') {
        togglePlay();
      }
    });

    // Start
    updateCounter();
    startProgress();
    autoPlay();
  </script>
</body>
</html>
